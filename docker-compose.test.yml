services:
  mysql:
    image: mysql:8
    command: --log-bin-trust-function-creators=1
    environment:
      MYSQL_DATABASE: mlm_test
      MYSQL_USER: mlm
      MYSQL_PASSWORD: mlm
      MYSQL_ROOT_PASSWORD: mlm_root
    ports:
      - "53307:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -umlm -pmlm --silent"]
      interval: 2s
      timeout: 5s
      retries: 60
